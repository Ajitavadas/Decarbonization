services:
  postgres:
    image: postgres:16-alpine
    container_name: decarbonization_postgres
    environment:
      POSTGRES_USER: decarb_user
      POSTGRES_PASSWORD: decarb_password
      POSTGRES_DB: decarb_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U decarb_user -d decarb_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - decarb-network

  timescaledb-setup:
    image: postgres:16-alpine
    container_name: timescaledb_setup
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: decarb_password
    command: >
      sh -c "psql -h postgres -U decarb_user -d decarb_db -c 
      'CREATE EXTENSION IF NOT EXISTS timescaledb;'"
    networks:
      - decarb-network

  redis:
    image: redis:7-alpine
    container_name: decarbonization_redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - decarb-network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: decarbonization_api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://decarb_user:decarb_password@postgres:5432/decarb_db
      REDIS_URL: redis://redis:6379
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-prod}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - decarb-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:

networks:
  decarb-network:
    driver: bridge
