services:
  # PostgreSQL with TimescaleDB
  postgres:
    image: postgis/postgis:16-3.4
    container_name: decarb_postgres
    environment:
      POSTGRES_USER: decarb_user
      POSTGRES_PASSWORD: decarb_password
      POSTGRES_DB: decarb_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U decarb_user -d decarb_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - decarb-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: decarb_redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - decarb-network

  # Backend API
  api:
    build:
      context: ./decarbonization-backend
      dockerfile: Dockerfile
    container_name: decarb_api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://decarb_user:decarb_password@postgres:5432/decarb_db
      REDIS_URL: redis://redis:6379
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-prod}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GROQ_API_KEY: ${GROQ_API_KEY}
      AI_MIN_CONFIDENCE_THRESHOLD: ${AI_MIN_CONFIDENCE_THRESHOLD:-0.80}
      PYTHONUNBUFFERED: 1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./decarbonization-backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - decarb-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 5s
      timeout: 30s
      retries: 5

  # Frontend Dashboard
  frontend:
    build:
      context: ./v0_frontend
      dockerfile: Dockerfile
      target: deps # Build up to deps stage for dev
    container_name: decarb_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
      - CHOKIDAR_USEPOLLING=true # Better file watching in Docker
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ./v0_frontend:/app
      - /app/node_modules # Don't overwrite node_modules with host
    command: npm run dev
    networks:
      - decarb-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  redis_data:

networks:
  decarb-network:
    driver: bridge
