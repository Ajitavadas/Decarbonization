# Docker Compose override for integration testing
# Usage: docker-compose -f docker-compose.yml -f docker-compose.test.yml up

services:
  # Backend with test dependencies
  backend:
    environment:
      - ENVIRONMENT=testing
      - DEBUG=True
    volumes:
      - ./backend:/app
      - ./tests:/app/tests
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Test runner service
  test-runner:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: decarbonization-test-runner
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql://carbon_user:carbon_password@postgres:5432/decarbonization_db
      - REDIS_URL=redis://redis:6379/0
      - API_BASE_URL=http://backend:8000/api/v1
      - ENVIRONMENT=testing
    volumes:
      - ./backend:/app
      - ./tests:/app/tests
    depends_on:
      backend:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    working_dir: /app
    command: >
      sh -c "pip install pytest pytest-asyncio --quiet &&
             sleep 10 &&
             python -m pytest tests/test_dry_run.py -v --tb=short"
    profiles:
      - testing
